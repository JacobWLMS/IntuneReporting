name: Compile Bicep to ARM JSON

on:
  push:
    paths:
      - 'deployment/**/*.bicep'
    branches:
      - main
  pull_request:
    paths:
      - 'deployment/**/*.bicep'
  workflow_dispatch: # Allow manual trigger

jobs:
  compile-bicep:
    name: Compile Bicep templates to ARM JSON
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x ./bicep
          sudo mv ./bicep /usr/local/bin/bicep
          bicep --version
        
      - name: Compile Bicep templates
        run: |
          # Compile ADX backend template
          cd deployment/adx
          bicep build main.bicep --outfile main.json
          echo "✅ Compiled deployment/adx/main.bicep -> main.json"
          
          # Compile Log Analytics backend template
          cd ../loganalytics
          bicep build main.bicep --outfile main.json
          echo "✅ Compiled deployment/loganalytics/main.bicep -> main.json"

      - name: Verify JSON outputs
        run: |
          for file in deployment/adx/main.json deployment/loganalytics/main.json; do
            if [ -f "$file" ]; then
              echo "✅ $file exists ($(stat -c%s "$file") bytes)"
            else
              echo "❌ $file not found"
              exit 1
            fi
          done

      - name: Commit compiled JSON
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if there are changes to commit
          git add deployment/adx/main.json deployment/loganalytics/main.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔧 Auto-compile Bicep to ARM JSON [skip ci]"
            git push
          fi

