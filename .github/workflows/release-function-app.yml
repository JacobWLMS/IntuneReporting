name: Release Function App

on:
  push:
    branches: [main]
    paths:
      - 'fn_*/**'
      - 'shared/**'
      - 'requirements.txt'
      - 'host.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create function app zip
        run: |
          # Create zip with function app files
          # IMPORTANT: Flex Consumption requires the package to be named 'released-package.zip'
          zip -r released-package.zip \
            fn_*/ \
            shared/ \
            requirements.txt \
            host.json \
            -x "**/__pycache__/*" \
            -x "**/*.pyc"
          
          echo "📦 Created released-package.zip ($(stat -c%s released-package.zip) bytes)"
          unzip -l released-package.zip | head -30

      - name: Delete existing release
        run: |
          # Delete the existing 'latest' release if it exists
          gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new release
        run: |
          gh release create latest \
            --title "Latest Function App Release" \
            --notes "Auto-generated release containing the function app deployment package.
          
          **Download:** \`released-package.zip\`
          
          **Commit:** ${{ github.sha }}
          **Updated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" \
            --latest \
            released-package.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release
        run: |
          echo "✅ Release published successfully"
          echo "📥 Download URL: https://github.com/${{ github.repository }}/releases/latest/download/function-app.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
